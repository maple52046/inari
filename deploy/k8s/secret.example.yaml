# Example only. Do NOT commit real secrets.
# In a real cluster, create this from your .env.local instead, e.g.:
#   kubectl -n inari create secret generic inari-env --from-env-file=.env.local
apiVersion: v1
kind: Secret
metadata:
  name: inari-env
  namespace: inari
type: Opaque
stringData:
  # Must be >= 32 chars. Generate with: openssl rand -base64 32
  SESSION_SECRET: "replace-with-a-long-random-string-at-least-32-chars"
  DEFAULT_S3_ENDPOINT: "https://xyz.example.com"
  # Only needed behind a reverse proxy where the browser Origin differs from the
  # forwarded Host. Comma-separated hosts (no protocol/port), e.g.:
  #   inari.example.com,*.example.com
  SERVER_ACTIONS_ALLOWED_ORIGINS: "xyz.example.com"
